<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>사진 갤러리</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f5f5f5;
      font-family: 'Segoe UI', sans-serif;
    }

    header {
      background: #3b82f6;
      color: white;
      text-align: center;
      padding: 24px 16px;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
    }

    header p {
      margin-top: 6px;
      font-size: 0.95rem;
      opacity: 0.85;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
      padding: 20px;
      max-width: 960px;
      margin: 0 auto;
    }

    .grid img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
    }

    .grid img:hover {
      transform: scale(1.04);
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    }

    /* 라이트박스 */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    #lightbox.active {
      display: flex;
    }

    #lightbox img {
      max-width: 92vw;
      max-height: 80vh;
      border-radius: 10px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    #lightbox-counter {
      color: white;
      margin-top: 14px;
      font-size: 1rem;
      opacity: 0.8;
    }

    #lightbox-close {
      position: absolute;
      top: 18px;
      right: 22px;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      opacity: 0.8;
    }

    #lightbox-close:hover { opacity: 1; }

    #lightbox-prev,
    #lightbox-next {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.15);
      color: white;
      border: none;
      font-size: 2rem;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #lightbox-prev { left: 14px; }
    #lightbox-next { right: 14px; }
    #lightbox-prev:hover,
    #lightbox-next:hover { background: rgba(255,255,255,0.3); }
  </style>
</head>
<body>

<header>
  <h1>📷 사진 갤러리</h1>
  <p>사진을 클릭하면 크게 볼 수 있어요</p>
</header>

<div class="grid" id="grid"></div>

<!-- 라이트박스 -->
<div id="lightbox">
  <span id="lightbox-close">&times;</span>
  <button id="lightbox-prev">&#8249;</button>
  <img id="lightbox-img" src="" alt="">
  <div id="lightbox-counter"></div>
  <button id="lightbox-next">&#8250;</button>
</div>

<script>
  const total = 18;
  const images = Array.from({ length: total }, (_, i) => `${i + 1}.jpg`);

  const grid = document.getElementById('grid');
  images.forEach((src, idx) => {
    const img = document.createElement('img');
    img.src = src;
    img.alt = `사진 ${idx + 1}`;
    img.addEventListener('click', () => openLightbox(idx));
    grid.appendChild(img);
  });

  let current = 0;
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lightbox-img');
  const lbCounter = document.getElementById('lightbox-counter');

  function openLightbox(idx) {
    current = idx;
    lbImg.src = images[current];
    lbCounter.textContent = `${current + 1} / ${total}`;
    lightbox.classList.add('active');
  }

  function closeLightbox() {
    lightbox.classList.remove('active');
  }

  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

  document.getElementById('lightbox-prev').addEventListener('click', e => {
    e.stopPropagation();
    current = (current - 1 + total) % total;
    lbImg.src = images[current];
    lbCounter.textContent = `${current + 1} / ${total}`;
  });

  document.getElementById('lightbox-next').addEventListener('click', e => {
    e.stopPropagation();
    current = (current + 1) % total;
    lbImg.src = images[current];
    lbCounter.textContent = `${current + 1} / ${total}`;
  });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('active')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') document.getElementById('lightbox-prev').click();
    if (e.key === 'ArrowRight') document.getElementById('lightbox-next').click();
  });
</script>

</body>
</html>
